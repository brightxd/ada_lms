<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listas — To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <span class="header-icon">✅</span>
  <h1>To-Do List</h1>
</header>

<nav class="breadcrumb">
  <a href="index.html">Usuários</a>
  <span>›</span>
  <span>Ana Silva</span>
</nav>

<main>
  <div class="section-header">
    <div>
      <h2>Listas de Ana Silva</h2>
      <p>2 listas</p>
    </div>
    <a href="#modal-list" class="btn btn-primary">+ Nova lista</a>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-icon">📋</div>
      <div class="card-title">Trabalho</div>
      <div class="card-sub">3 tarefas · 1 concluída</div>
      <div class="card-actions">
        <a href="tarefas.html" class="btn btn-primary btn-sm btn-flex">Ver tarefas</a>
        <button class="btn btn-danger btn-sm">🗑</button>
      </div>
    </div>

    <div class="card">
      <div class="card-icon">📋</div>
      <div class="card-title">Pessoal</div>
      <div class="card-sub">2 tarefas · 1 concluída</div>
      <div class="card-actions">
        <a href="tarefas.html" class="btn btn-primary btn-sm btn-flex">Ver tarefas</a>
        <button class="btn btn-danger btn-sm">🗑</button>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-list">
  <div class="modal">
    <h3>Nova Lista</h3>
    <div class="form-group">
      <label for="inp-list-name">Nome</label>
      <input id="inp-list-name" type="text" placeholder="Ex: Trabalho, Compras…">
    </div>
    <div class="modal-actions">
      <a href="#" class="btn btn-ghost">Cancelar</a>
      <button class="btn btn-primary">Criar</button>
    </div>
  </div>
</div>

</body>
</html>
